<body>
<div class="container">
    <h1>📚 完整数学指南</h1>
    <div class="subtitle">函数 · 微积分· 积分 · 矩阵（逆/特征值）· 统计 | 下拉菜单选择主题</div>

    <div class="topic-nav">
        <label>📖 选择学习主题：</label>
        <select id="topicSelect">
            <option value="functions">🔹 函数基础 & 幂函数 (Power Function)</option>
            <option value="precalculus">📐 预备微积分 (指数/对数/三角)</option>
            <option value="calculus1">⚡ 微积分 I — 导数 (变化率)</option>
            <option value="calculus2">📦 微积分 II — 积分 (面积与累加)</option>
            <option value="matrices">🧮 矩阵 — 逆矩阵 & 特征值</option>
            <option value="statistics">📊 基础统计 (均值/方差/正态分布)</option>
        </select>
    </div>

    <div id="topicContent" class="content-card">
        <div class="content-header">
            <h2>🔹 函数基础 & 幂函数 <span class="badge">详细讲解</span></h2>
        </div>
        <div class="content-body" id="dynamicBody"></div>
    </div>

</div>

<script>
    // 所有 LaTeX 中的反斜杠都使用双反斜杠转义，确保 \frac, \sqrt, \int, \lim 等正确渲染
    const topicsContent = {
        functions: `
            <h3>📌 什么是函数？</h3>
            <div class="detail-box">
                <strong>🔹 函数定义：</strong> 函数是一种对应规则：每个输入值 \\( x \\) 对应唯一的输出值 \\( y = f(x) \\)。<br>
                想象一个“魔法盒子”：输入2，经过规则 \\( f(x) = x + 3 \\)，输出5。<br>
                <strong>定义域：</strong> 所有允许的输入值；<strong>值域：</strong> 所有可能的输出值。
            </div>
            <h3>📈 幂函数 (Power Function) — 详细专题</h3>
            <div class="detail-box" style="background:#eef4fa; border-left-color: #3a86a5;">
                <strong>✨ 幂函数标准形式：</strong> \\( f(x) = x^a \\)，其中 \\( a \\) 是任意实数常数。<br>
                <strong>常见幂函数及性质：</strong>
                <ul>
                    <li><strong>\\( a = 2 \\) (平方函数):</strong> \\( f(x) = x^2 \\)，抛物线，经过 \\((0,0)\\), \\((1,1)\\), \\((-1,1)\\)，在 \\( x = 0 \\) 取最小值。</li>
                    <li><strong>\\( a = 3 \\) (立方函数):</strong> \\( f(x) = x^3 \\)，奇函数，穿过原点，全区间递增。</li>
                    <li><strong>\\( a = \\frac{1}{2} \\) (平方根函数):</strong> \\( f(x) = \\sqrt{x} = x^{1/2} \\)，定义域 \\( x \\ge 0 \\)，图像平缓上升。</li>
                    <li><strong>\\( a = -1 \\) (反比例函数):</strong> \\( f(x) = \\frac{1}{x} = x^{-1} \\)，双曲线，渐近线 \\( x=0 \\) 和 \\( y=0 \\)。</li>
                </ul>
                <strong>🔢 幂函数求导法则：</strong> 若 \\( f(x) = x^a \\)，则 \\( f'(x) = a \\, x^{a-1} \\)。<br>
                例子：\\( f(x) = x^5 \\Rightarrow f'(x) = 5x^4 \\)；\\( f(x) = \\sqrt{x} \\Rightarrow f'(x) = \\frac{1}{2\\sqrt{x}} \\)。<br>
                <strong>📐 幂函数积分法则：</strong> \\( \\int x^a \\, dx = \\frac{x^{a+1}}{a+1} + C \\)（当 \\( a \\neq -1 \\)）。<br>
                例子：\\( \\int x^3 \\, dx = \\frac{x^4}{4} + C \\)。
            </div>
            <div class="example-box">
                🧪 <strong>实际应用：</strong> 自由落体距离 \\( s = \\frac{1}{2}gt^2 \\) 是幂函数（\\( t^2 \\)）；开普勒第三定律 \\( T^2 \\propto R^3 \\)。
            </div>
            <h3>📊 其他常见函数族</h3>
            <div class="grid-2">
                <div class="concept-card"><h4>📈 线性函数</h4><p>\\( f(x)=mx+b \\)，斜率 \\( m \\)。例：出租车费。</p></div>
                <div class="concept-card"><h4>🌀 二次函数</h4><p>\\( f(x)=ax^2+bx+c \\)，抛物线。例：抛射高度。</p></div>
                <div class="concept-card"><h4>⚡ 指数函数</h4><p>\\( f(x)=b^x \\)，\\( b>0, b\\neq1 \\)，增长/衰减。例：细菌分裂。</p></div>
                <div class="concept-card"><h4>🌊 三角函数</h4><p>\\( \\sin x, \\cos x \\)，周期波。例：交流电。</p></div>
            </div>
        `,
        precalculus: `
            <h3>📐 预备微积分：指数、对数与三角基础</h3>
            <div class="detail-box">
                <strong>🔹 指数法则：</strong> \\( a^m \\times a^n = a^{m+n} \\)，\\( (a^m)^n = a^{mn} \\)，\\( a^0 = 1 \\)。<br>
                <strong>🔹 对数定义：</strong> 若 \\( b^y = x \\)，则 \\( \\log_b x = y \\)。对数是指数的逆运算。<br>
                例：\\( \\log_2 8 = 3 \\)，因为 \\( 2^3 = 8 \\)。自然对数 \\( \\ln x = \\log_e x \\)。<br>
                <strong>对数性质：</strong> \\( \\log_b(mn) = \\log_b m + \\log_b n \\)，\\( \\log_b(m^k) = k \\log_b m \\)。
            </div>
            <div class="example-box">
                💡 <strong>应用：</strong> pH = \\( -\\log_{10}[H^+] \\)，里氏震级 \\( M = \\log_{10}(A/A_0) \\)。<br>
                🔹 <strong>三角函数核心值：</strong> \\( \\sin 0 = 0, \\sin 90^\\circ = 1, \\cos 0 = 1, \\cos 90^\\circ = 0 \\)。
            </div>
            <div class="formula-card">
                📐 重要恒等式：\\( \\sin^2\\theta + \\cos^2\\theta = 1 \\)，\\( \\sin(2\\theta)=2\\sin\\theta\\cos\\theta \\)。
            </div>
            <div class="detail-box">
                <strong>🌍 应用实例：</strong> 简谐振动 \\( x(t)=A\\cos(\\omega t + \\phi) \\)，声音、光波依赖三角函数。
            </div>
        `,
        calculus1: `
            <h3>⚡ 导数 \\( f'(x) \\)：瞬时变化率</h3>
            <div class="detail-box">
                <strong>定义（极限形式）：</strong> \\( f'(x) = \\lim_{h\\to 0} \\frac{f(x+h)-f(x)}{h} \\)。<br>
                <strong>几何意义：</strong> 导数 \\( f'(x) \\) 表示曲线 \\( y=f(x) \\) 在点 \\( (x, f(x)) \\) 处的切线斜率。<br>
                🚗 <strong>生活类比：</strong> 车速表显示路程函数 \\( s(t) \\) 的导数 \\( s'(t) \\)（瞬时速度）。<br>
                <strong>幂函数求导（Prime Notation）：</strong> 若 \\( f(x)=x^n \\)，则 \\( f'(x)=n x^{n-1} \\)。<br>
                例子：\\( f(x)=x^4 \\Rightarrow f'(x)=4x^3 \\)；\\( f(x)=\\sqrt{x} \\Rightarrow f'(x)=\\frac{1}{2\\sqrt{x}} \\)。
            </div>
            <div class="grid-2">
                <div class="concept-card"><h4>常用导数公式</h4>
                    <ul><li>常数：\\( f(x)=c \\Rightarrow f'(x)=0 \\)</li><li>\\( f(x)=e^x \\Rightarrow f'(x)=e^x \\)</li><li>\\( f(x)=\\ln x \\Rightarrow f'(x)=\\frac{1}{x} \\)</li><li>\\( f(x)=\\sin x \\Rightarrow f'(x)=\\cos x \\)</li><li>\\( f(x)=\\cos x \\Rightarrow f'(x)=-\\sin x \\)</li></ul>
                </div>
                <div class="concept-card"><h4>求导法则</h4>
                    <p>• 乘积法则：\\( (fg)'(x) = f'(x)g(x) + f(x)g'(x) \\)<br>
                    • 链式法则：\\( [f(g(x))]' = f'(g(x)) \\cdot g'(x) \\)<br>
                    • 商法则：\\( \\left(\\frac{f}{g}\\right)'(x) = \\frac{f'(x)g(x)-f(x)g'(x)}{[g(x)]^2} \\)<br>
                    例：\\( f(x)=(3x+1)^5 \\Rightarrow f'(x)=15(3x+1)^4 \\)。</p>
                </div>
            </div>
            <div class="example-box">
                📈 <strong>应用：边际成本</strong> \\( C(x) \\) 的导数 \\( C'(x) \\) 是额外一件产品的成本。<br>
                🎯 <strong>例题：</strong> \\( f(x)=3x^2+2x \\)，求 \\( f'(x) \\) 及 \\( f'(2) \\)。解答：\\( f'(x)=6x+2 \\)，\\( f'(2)=14 \\)。
            </div>
            <div class="detail-box"><strong>📌 高阶导数：</strong> 二阶导数 \\( f''(x) \\) 表示加速度或曲率。例：\\( f(x)=x^3 \\Rightarrow f'(x)=3x^2, f''(x)=6x \\)。</div>
        `,
        calculus2: `
            <h3>📦 积分：累加与面积</h3>
            <div class="detail-box">
                <strong>不定积分（反导数）：</strong> 求 \\( F(x) \\) 使 \\( F'(x)=f(x) \\)，记作 \\( \\int f(x)dx \\)。<br>
                <strong>幂函数积分公式：</strong> \\( \\int x^n dx = \\frac{x^{n+1}}{n+1} + C \\)（\\( n \\neq -1 \\)）。<br>
                例：\\( \\int x^3 dx = \\frac{x^4}{4} + C \\)；\\( \\int \\frac{1}{x^2} dx = -\\frac{1}{x} + C \\)。<br>
                <strong>定积分 (面积)：</strong> \\( \\int_a^b f(x)dx = F(b)-F(a) \\)（牛顿-莱布尼茨公式）。
            </div>
            <div class="example-box">
                💧 <strong>详细例子：</strong> \\( \\int_1^3 2x dx = [x^2]_1^3 = 9-1 = 8 \\)。几何意义：曲线 \\( y=2x \\) 下方面积为8。
            </div>
            <div class="detail-box">
                <strong>应用：</strong> 速度积分得位移 \\( \\int v(t)dt \\)；水流速率积分得总水量；概率密度积分得概率。
            </div>
            <div class="formula-card">
                📐 常用积分：\\( \\int e^x dx = e^x + C \\)，\\( \\int \\frac{1}{x} dx = \\ln|x| + C \\)，\\( \\int \\sin x dx = -\\cos x + C \\)
            </div>
        `,
        matrices: `
            <h3>🧮 矩阵：数字表格及其运算</h3>
            <div class="detail-box">
                <strong>矩阵定义：</strong> \\( \\begin{bmatrix} a & b \\\\ c & d \\end{bmatrix} \\) 是 2×2 矩阵。<br>
                <strong>🔹 逆矩阵 (Inverse)：</strong> 满足 \\( A A^{-1} = I \\)（单位矩阵）。存在逆的条件：行列式 \\( \\det(A) \\neq 0 \\)。<br>
                <strong>2×2 逆矩阵公式：</strong> 若 \\( A = \\begin{bmatrix} a & b \\\\ c & d \\end{bmatrix} \\)，则 \\( A^{-1} = \\frac{1}{ad-bc} \\begin{bmatrix} d & -b \\\\ -c & a \\end{bmatrix} \\)。<br>
                例：\\( A = \\begin{bmatrix} 2 & 3 \\\\ 1 & 4 \\end{bmatrix} \\)，\\( \\det=5 \\)，\\( A^{-1} = \\frac{1}{5}\\begin{bmatrix} 4 & -3 \\\\ -1 & 2 \\end{bmatrix} \\)。
            </div>
            <div class="detail-box" style="background:#f0f4fa;">
                <strong>✨ 特征值与特征向量：</strong> 若 \\( A\\mathbf{v} = \\lambda \\mathbf{v} \\)，\\( \\mathbf{v} \\neq \\mathbf{0} \\)，则 \\( \\lambda \\) 是特征值，\\( \\mathbf{v} \\) 是特征向量。<br>
                <strong>计算方法：</strong> 解特征方程 \\( \\det(A - \\lambda I) = 0 \\)。<br>
                <strong>详细例子：</strong> \\( A = \\begin{bmatrix} 3 & 1 \\\\ 1 & 3 \\end{bmatrix} \\)，特征方程 \\( (3-\\lambda)^2 - 1 = \\lambda^2 -6\\lambda +8 =0 \\) → \\( \\lambda=4,2 \\)。<br>
                对于 \\( \\lambda=4 \\)：特征向量 \\( \\begin{bmatrix}1\\\\1\\end{bmatrix} \\)；对于 \\( \\lambda=2 \\)：特征向量 \\( \\begin{bmatrix}1\\\\-1\\end{bmatrix} \\)。<br>
                <strong>应用：</strong> Google PageRank、主成分分析(PCA)、振动分析。
            </div>
            <div class="example-box">
                📌 <strong>线性方程组求解：</strong> 用逆矩阵解 \\( A\\mathbf{x}=\\mathbf{b} \\)，则 \\( \\mathbf{x}=A^{-1}\\mathbf{b} \\)。<br>
                例：解 \\( \\begin{bmatrix}2&1\\\\1&2\\end{bmatrix}\\mathbf{x}=\\begin{bmatrix}5\\\\4\\end{bmatrix} \\)，\\( A^{-1}=\\frac{1}{3}\\begin{bmatrix}2&-1\\\\-1&2\\end{bmatrix} \\)，得 \\( \\mathbf{x}=\\begin{bmatrix}2\\\\1\\end{bmatrix} \\)。
            </div>
        `,
        statistics: `
            <h3>📊 基础统计：描述数据</h3>
            <div class="detail-box">
                <strong>🔹 均值 (Mean)：</strong> \\( \\bar{x} = \\frac{1}{n}\\sum_{i=1}^{n} x_i \\)。<br>
                <strong>🔹 中位数 (Median)：</strong> 排序后中间的数。<br>
                <strong>🔹 方差与标准差：</strong> 总体方差 \\( \\sigma^2 = \\frac{1}{n}\\sum (x_i - \\bar{x})^2 \\)，标准差 \\( \\sigma = \\sqrt{\\sigma^2} \\)。<br>
                <strong>🔹 正态分布：</strong> 钟形曲线 \\( N(\\mu, \\sigma^2) \\)，68-95-99.7 法则。
            </div>
            <div class="example-box">
                📈 <strong>详细例子：</strong> 数据 [4, 8, 6, 5, 3] <br>
                均值 = \\( (4+8+6+5+3)/5 = 5.2 \\)。<br>
                方差 = \\( [(4-5.2)^2+(8-5.2)^2+(6-5.2)^2+(5-5.2)^2+(3-5.2)^2]/5 = 2.96 \\)。<br>
                标准差 \\( \\approx 1.72 \\)，中位数 = 5。
            </div>
            <div class="detail-box">
                <strong>📐 Z-score：</strong> \\( z = \\frac{x - \\mu}{\\sigma} \\)。例：智商 \\( N(100,15) \\)，130 的 \\( z = 2 \\)，约 97.7 百分位。
            </div>
            <div class="example-box">💡 <strong>应用：</strong> 质量控制（6σ）、考试成绩分析、医学参考范围。</div>
        `
    };

    const topicSelect = document.getElementById('topicSelect');
    const dynamicBody = document.getElementById('dynamicBody');
    const contentHeader = document.querySelector('#topicContent .content-header h2');

    function updateTopic() {
        const val = topicSelect.value;
        let title = "", html = "";
        switch(val) {
            case "functions": title = "🔹 函数基础 & 幂函数"; html = topicsContent.functions; break;
            case "precalculus": title = "📐 预备微积分 (指数/对数/三角)"; html = topicsContent.precalculus; break;
            case "calculus1": title = "⚡ 微积分 I — 导数 \\( f'(x) \\) (变化率)"; html = topicsContent.calculus1; break;
            case "calculus2": title = "📦 微积分 II — 积分 (面积与累加)"; html = topicsContent.calculus2; break;
            case "matrices": title = "🧮 矩阵 — 逆矩阵 & 特征值"; html = topicsContent.matrices; break;
            case "statistics": title = "📊 基础统计 (均值/方差/正态分布)"; html = topicsContent.statistics; break;
            default: title = "🔹 函数基础 & 幂函数"; html = topicsContent.functions;
        }
        contentHeader.innerHTML = title + ' <span class="badge">详细讲解</span>';
        dynamicBody.innerHTML = html;
        if (window.MathJax) MathJax.typesetPromise();
    }
    topicSelect.addEventListener('change', updateTopic);
    updateTopic();
</script>
</body>
</html>
